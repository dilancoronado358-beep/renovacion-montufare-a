<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia | Dr. Fabián Robles</title>
    <meta name="description" content="Galería de proyectos y eventos del Dr. Fabián Robles. Archivo visual de la renovación montufareña.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* Lightbox */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
        .lightbox.open{display:flex}
        .lightbox img{max-width:92vw;max-height:85vh;border-radius:10px;object-fit:contain}
        .lightbox-close{position:absolute;top:18px;right:24px;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none}
        .lightbox-nav{display:flex;gap:20px;margin-top:16px}
        .lightbox-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:10px 22px;border-radius:8px;font-size:1rem;cursor:pointer;transition:background .2s}
        .lightbox-nav button:hover{background:rgba(255,255,255,.3)}
        .lightbox-counter{color:rgba(255,255,255,.6);font-size:.85rem;margin-top:8px}
        /* Album foto grid */
        .foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
        .foto-grid img{width:100%;height:160px;object-fit:cover;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s}
        .foto-grid img:hover{transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.18)}
        /* Album detail view */
        #album-detail{display:none;padding:40px 0}
        .back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#0a1628;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:24px;text-decoration:none}
        .back-btn:hover{background:#1a3a6b}
    </style>
</head>
<body class="rc-theme">

    <a href="https://wa.me/593987851539?text=Quiero%20formar%20parte%20de%20su%20equipo" class="whatsapp-btn" target="_blank" aria-label="Escríbenos por WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="nav-rc" id="main-nav">
        <div class="container-rc flex-row justify-between align-center">
            <div class="logo-box">
                <a href="index.html#home">
                    <img src="https://res.cloudinary.com/dtmqftcsr/image/upload/q_auto/f_auto/v1776302644/WhatsApp_Image_2026-04-15_at_11.28.42_AM_ieuo0z.jpg" alt="Logo Robles" class="nav-logo">
                </a>
            </div>
            <div class="menu-wrap" id="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html">INICIO</a></li>
                    <li><a href="trayectoria.html">TRAYECTORIA</a></li>
                    <li><a href="sobre-mi.html">SOBRE MÍ</a></li>
                    <li><a href="propuestas.html">PROPUESTAS</a></li>
                    <li><a href="multimedia.html" class="active">MULTIMEDIA</a></li>
                    <li><a href="index.html#contacto" class="btn-cta-nav">SÚMATE</a></li>
                    <li><a href="admin.html" class="btn-login-nav"><i class="fas fa-user-lock"></i> INGRESAR</a></li>
                </ul>
            </div>
            <div class="mobile-btn" id="mobile-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-rc bg-navy text-white" style="min-height:40vh;padding-top:200px;">
        <div class="container-rc text-center" data-aos="fade-up">
            <h1 class="hero-title" style="font-size:3.5rem;">ARCHIVOS DE LA <br><span class="text-cyan">RENOVACIÓN</span></h1>
            <p class="lead-rc">Testimonios visuales de nuestro compromiso con Montúfar.</p>
        </div>
    </section>

    <!-- Lista de Álbumes -->
    <section id="albums-section" class="section-padding bg-white">
        <div class="container-rc">
            <div id="albums-grid" class="album-grid">
                <!-- Cargado dinámicamente -->
                <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:#888">
                    <i class="fas fa-circle-notch fa-spin" style="font-size:2rem;margin-bottom:12px;display:block"></i>
                    Cargando álbumes...
                </div>
            </div>
            <div class="text-center mt-80">
                <a href="index.html" class="btn-rc btn-navy"><i class="fas fa-arrow-left"></i> VOLVER AL INICIO</a>
            </div>
        </div>
    </section>

    <!-- Vista detalle de álbum -->
    <section id="album-detail" class="section-padding bg-white">
        <div class="container-rc">
            <button class="back-btn" onclick="backToAlbums()"><i class="fas fa-arrow-left"></i> Volver a álbumes</button>
            <h2 id="album-detail-title" class="title-rc" style="margin-bottom:8px"></h2>
            <p id="album-detail-meta" style="color:#888;margin-bottom:4px;font-size:.9rem"></p>
            <p id="album-detail-count" style="color:#00A650;font-weight:600;font-size:.85rem;margin-bottom:16px"></p>
            <div id="album-fotos-grid" class="foto-grid"></div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <img id="lb-img" src="" alt="Foto">
        <div class="lightbox-nav">
            <button onclick="lbNav(-1)"><i class="fas fa-chevron-left"></i> Anterior</button>
            <button onclick="lbNav(1)">Siguiente <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="lightbox-counter" id="lb-counter"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        AOS.init({duration:1000,once:true});

        const SB_URL = 'https://agqrytictqmjzupqrnqp.supabase.co';
        const SB_KEY = 'sb_publishable_RuhFkhy2RrVwu4ZYbLZOGw_be0S_rDf';
        const db = (window.supabase && window.supabase.createClient)
            ? window.supabase.createClient(SB_URL, SB_KEY) : null;

        let lbFotos = [], lbIdx = 0;

        async function loadAlbums(){
            const grid = document.getElementById('albums-grid');
            if(!db){
                grid.innerHTML='<p style="color:#aaa;grid-column:1/-1;text-align:center">No hay conexión con la base de datos.</p>';
                return;
            }
            const {data,error} = await db.from('albumes').select('*').order('id',{ascending:false});
            if(error||!data||!data.length){
                // Fallback: mostrar álbumes estáticos
                renderStaticAlbums(grid);
                return;
            }
            grid.innerHTML='';
            data.forEach((alb,i)=>{
                const fotos = Array.isArray(alb.fotos)?alb.fotos:[];
                const a = document.createElement('a');
                a.className='album-card';
                a.href='#';
                a.setAttribute('data-aos','zoom-in');
                a.setAttribute('data-aos-delay', String(i*100));
                a.innerHTML=`
                    <img src="${alb.portada_url||''}" alt="${alb.titulo}">
                    <div class="album-overlay">
                        <span>${alb.fecha||''}</span>
                        <h3>${alb.titulo}</h3>
                        <span>${alb.lugar||''} &bull; ${fotos.length} fotos</span>
                    </div>`;
                a.addEventListener('click',e=>{e.preventDefault();openAlbum(alb);});
                grid.appendChild(a);
            });
        }

        function renderStaticAlbums(grid){
            const estaticos=[
                {titulo:'Capacitación: Manejo de Redes Sociales',fecha:'11 DE ABRIL, 2026',lugar:'Casa El Arrayán',portada:'https://res.cloudinary.com/dtmqftcsr/image/upload/q_auto/f_auto/v1776307899/WhatsApp_Image_2026-04-15_at_9.49.48_PM_4_yj3qtv.jpg',fotos:[]},
                {titulo:'Brigada Chutan Bajo',fecha:'20 DE ABRIL, 2026',lugar:'Montúfar',portada:'https://res.cloudinary.com/dtmqftcsr/image/upload/q_auto/f_auto/v1776664480/IMG-20260419-WA0107_zci17q.jpg',fotos:[]},
                {titulo:'Recorrido y Actividades',fecha:'26 DE ABRIL, 2026',lugar:'Montúfar',portada:'https://res.cloudinary.com/dtmqftcsr/image/upload/v1777300536/lv_0_20260425120457_vvkaun.jpg',fotos:[]},
            ];
            grid.innerHTML='';
            estaticos.forEach((alb,i)=>{
                const a=document.createElement('a');
                a.className='album-card';
                a.href='#';
                a.setAttribute('data-aos','zoom-in');
                a.setAttribute('data-aos-delay',String(i*100));
                a.innerHTML=`<img src="${alb.portada}" alt="${alb.titulo}"><div class="album-overlay"><span>${alb.fecha}</span><h3>${alb.titulo}</h3><span>${alb.lugar}</span></div>`;
                a.addEventListener('click',e=>{e.preventDefault();openAlbum({titulo:alb.titulo,fecha:alb.fecha,lugar:alb.lugar,fotos:alb.fotos});});
                grid.appendChild(a);
            });
        }

        function openAlbum(alb){
            document.getElementById('albums-section').style.display='none';
            const det=document.getElementById('album-detail');
            det.style.display='block';
            document.getElementById('album-detail-title').textContent=alb.titulo;
            document.getElementById('album-detail-meta').textContent=(alb.fecha||'')+(alb.lugar?' — '+alb.lugar:'');
            const fotos=Array.isArray(alb.fotos)?alb.fotos:[];
            document.getElementById('album-detail-count').textContent=fotos.length+' foto(s)';
            lbFotos=fotos;
            const g=document.getElementById('album-fotos-grid');
            g.innerHTML='';
            if(!fotos.length){
                g.innerHTML='<p style="color:#aaa">Este álbum no tiene fotos aún.</p>';
            } else {
                fotos.forEach((url,idx)=>{
                    const img=document.createElement('img');
                    img.src=url;
                    img.alt='Foto '+(idx+1);
                    img.onclick=()=>openLightbox(idx);
                    g.appendChild(img);
                });
            }
            det.scrollIntoView({behavior:'smooth'});
        }

        function backToAlbums(){
            document.getElementById('album-detail').style.display='none';
            document.getElementById('albums-section').style.display='block';
            window.scrollTo({top:0,behavior:'smooth'});
        }

        function openLightbox(idx){
            lbIdx=idx;
            document.getElementById('lb-img').src=lbFotos[lbIdx];
            document.getElementById('lb-counter').textContent=(lbIdx+1)+' / '+lbFotos.length;
            document.getElementById('lightbox').classList.add('open');
        }
        function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
        function lbNav(dir){
            lbIdx=(lbIdx+dir+lbFotos.length)%lbFotos.length;
            document.getElementById('lb-img').src=lbFotos[lbIdx];
            document.getElementById('lb-counter').textContent=(lbIdx+1)+' / '+lbFotos.length;
        }
        document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
        document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')closeLightbox();});

        loadAlbums();
    </script>
</body>
</html>
